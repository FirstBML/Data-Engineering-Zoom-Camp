services:
  postgres:
    image: postgres:18
    container_name: homework1_postgres
    environment:
      POSTGRES_USER: firstroot
      POSTGRES_PASSWORD: firstroot
      POSTGRES_DB: first_ny_taxi
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firstroot -d first_ny_taxi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homework_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: homework1_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: firstroot
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - homework_network

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homework1_ingest
    command: >
      --pg-user=firstroot
      --pg-pass=firstroot
      --pg-host=postgres
      --pg-port=5432
      --pg-db=first_ny_taxi
      --year=2025
      --month=11
      --chunk-size=10000
      --green-table=green_taxi_data
      --zone-table=taxi_zone_lookup
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homework_network
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  postgres_data:
  pgadmin_data:

networks:
  homework_network:
    driver: bridge
